services:
  web:
    build: .
    container_name: qr-menu
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:-degistir-bunu-uzun-rastgele-bir-deger}
      BRAND_NAME: ${BRAND_NAME:-Çam Vadisi}
      ACCENT_COLOR: ${ACCENT_COLOR:-#2563eb}
      DEFAULT_LANG: ${DEFAULT_LANG:-tr}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-1234}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      # SQLite veritabanı kalıcılığı
      - menu-data:/app/data
      # Yüklenen ürün görselleri kalıcılığı
      - menu-uploads:/app/public/uploads

volumes:
  menu-data:
  menu-uploads:
